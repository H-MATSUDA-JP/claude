<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Head-On</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #start-screen, #gameover-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 10;
      text-align: center;
    }
    #start-screen h1 {
      font-size: 46px;
      color: #ffd800;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,216,0,0.5);
      letter-spacing: 4px;
    }
    #start-screen p, #gameover-screen p {
      font-size: 14px;
      margin: 4px 12px;
      color: #ddd;
      line-height: 1.6;
    }
    #gameover-screen h2 {
      font-size: 40px;
      color: #ff3333;
      margin-bottom: 16px;
      letter-spacing: 4px;
    }
    .score-display {
      font-size: 20px;
      color: #ffd800;
      margin: 12px 0;
    }
    .blink {
      animation: blink 1s step-start infinite;
      margin-top: 20px !important;
      color: #fff !important;
      font-size: 16px !important;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #touch-controls {
      display: none;
      position: fixed;
      bottom: 12px;
      left: 0; right: 0;
      justify-content: center;
      gap: 14px;
      z-index: 5;
    }
    #touch-controls button {
      width: 90px;
      height: 64px;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: 2px solid #888;
      border-radius: 12px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #touch-controls button:active {
      background: rgba(255,216,0,0.3);
      border-color: #ffd800;
    }
    @media (hover: none) and (pointer: coarse) {
      #touch-controls { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="start-screen">
    <h1>HEAD-ON</h1>
    <p>ドットを全て集めてステージクリア！</p>
    <p>レーン変更は各辺中央の「切れ目」でのみ可能</p>
    <p>矢印キー＝レバー（中心向き＝内側／外向き＝外側）</p>
    <p>スペース＝加速（低速時2レーン・加速中1レーンまで変更可）</p>
    <p style="color:#ff6666;">敵車通過後の赤ドットは2倍得点！</p>
    <p class="blink">PRESS SPACE or TAP TO START</p>
  </div>

  <div id="gameover-screen" style="display:none;">
    <h2>GAME OVER</h2>
    <div class="score-display">SCORE: <span id="final-score">0</span></div>
    <p class="blink">PRESS SPACE or TAP TO RESTART</p>
  </div>

  <div id="touch-controls">
    <button id="out-btn">外側</button>
    <button id="speed-btn">加速</button>
    <button id="in-btn">内側</button>
  </div>

  <script>
    // --- Canvas Setup ---
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = 560;
    const H = 560;
    canvas.width = W;
    canvas.height = H;

    function resizeCanvas() {
      const maxW = window.innerWidth - 10;
      const maxH = window.innerHeight - 10;
      const scale = Math.min(maxW / W, maxH / H, 1);
      canvas.style.width = (W * scale) + 'px';
      canvas.style.height = (H * scale) + 'px';
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // --- Audio ---
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playSound(freq, dur, type = 'square', vol = 0.15) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    }
    function playDotSound() { playSound(1200, 0.04, 'square', 0.08); }
    function playRedDotSound() { playSound(1600, 0.06, 'square', 0.1); }
    function playCrashSound() {
      playSound(150, 0.4, 'sawtooth', 0.25);
      setTimeout(() => playSound(80, 0.35, 'sawtooth', 0.2), 100);
    }
    function playStageClearSound() {
      [0, 100, 200, 300, 400].forEach((d, i) =>
        setTimeout(() => playSound(440 + i * 110, 0.15, 'square', 0.12), d)
      );
    }

    // --- Colors (faithful to original: blue bg, white lines, yellow player, red enemy) ---
    const COLOR_BG = '#2222cc';
    const COLOR_LINE = '#ffffff';
    const COLOR_DOT = '#ffffff';
    const COLOR_RED_DOT = '#ff4040';
    const COLOR_PLAYER = '#ffd800';
    const COLOR_ENEMY = '#ff2020';

    // --- Track Geometry ---
    // 5 concentric rectangular lanes, square corners.
    // Path is counter-clockwise (visually): bottom→right, right side→up, top→left, left side→down.
    const LANE_COUNT = 5;
    const MARGIN = 64;       // outer boundary offset
    const LANE_W = 30;       // lane width
    const GAP_HALF = 26;     // half-width of divider gap (lane-change zone) at side midpoints
    const ZONE_HALF = 24;    // half-length of change zone in t-space

    // Lane center offset for lane k (0 = outermost, 4 = innermost)
    function laneOffset(k) { return MARGIN + LANE_W * (k + 0.5); }

    // Build CCW rectangular path for lane k
    function buildLane(k) {
      const o = laneOffset(k);
      const p0 = { x: o, y: H - o };       // bottom-left
      const p1 = { x: W - o, y: H - o };   // bottom-right
      const p2 = { x: W - o, y: o };       // top-right
      const p3 = { x: o, y: o };           // top-left
      const points = [p0, p1, p2, p3, p0]; // closed
      const dists = [0];
      let total = 0;
      for (let i = 1; i < points.length; i++) {
        total += Math.abs(points[i].x - points[i-1].x) + Math.abs(points[i].y - points[i-1].y);
        dists.push(total);
      }
      const side = W - 2 * o; // side length
      // side midpoint t values: 0=bottom, 1=right, 2=top, 3=left
      const mids = [side * 0.5, side * 1.5, side * 2.5, side * 3.5];
      return { points, dists, totalDist: total, side, mids };
    }

    const lanes = [];
    for (let k = 0; k < LANE_COUNT; k++) lanes.push(buildLane(k));

    function wrapT(lane, t) {
      const d = lanes[lane].totalDist;
      return ((t % d) + d) % d;
    }

    function getPos(laneIdx, t) {
      const { points, dists, totalDist } = lanes[laneIdx];
      const wt = ((t % totalDist) + totalDist) % totalDist;
      for (let i = 1; i < points.length; i++) {
        if (wt <= dists[i]) {
          const segLen = dists[i] - dists[i-1];
          const frac = segLen > 0 ? (wt - dists[i-1]) / segLen : 0;
          return {
            x: points[i-1].x + (points[i].x - points[i-1].x) * frac,
            y: points[i-1].y + (points[i].y - points[i-1].y) * frac,
            angle: Math.atan2(points[i].y - points[i-1].y, points[i].x - points[i-1].x)
          };
        }
      }
      return { x: points[0].x, y: points[0].y, angle: 0 };
    }

    // Which change zone (side index 0-3) is position t in? -1 if none.
    function zoneAt(laneIdx, t) {
      const lane = lanes[laneIdx];
      const wt = wrapT(laneIdx, t);
      for (let s = 0; s < 4; s++) {
        let diff = Math.abs(wt - lane.mids[s]);
        if (diff > lane.totalDist / 2) diff = lane.totalDist - diff;
        if (diff < ZONE_HALF) return s;
      }
      return -1;
    }

    // Map t on one lane to spatially-aligned t on another lane (near side s midpoint)
    function mapT(fromLane, toLane, t, s) {
      const rel = wrapT(fromLane, t) - lanes[fromLane].mids[s];
      return wrapT(toLane, lanes[toLane].mids[s] + rel);
    }

    // --- Dots ---
    const DOT_SPACING = 24;
    const ZONE_SKIP = GAP_HALF + 10; // don't place dots in/near change zones
    let dots = [];

    function initDots() {
      dots = [];
      for (let k = 0; k < LANE_COUNT; k++) {
        const lane = lanes[k];
        for (let s = 0; s < 4; s++) {
          const t0 = s * lane.side;
          const mid = lane.mids[s];
          for (let t = t0 + 14; t < t0 + lane.side - 12; t += DOT_SPACING) {
            if (Math.abs(t - mid) < ZONE_SKIP) continue;
            dots.push({ lane: k, t, state: 0 }); // 0=white, 1=red, 2=eaten
          }
        }
      }
    }

    // --- Game State ---
    let score = 0;
    let lives = 3;
    let stage = 1;
    let hiScore = parseInt(localStorage.getItem('headon_hiscore') || '0');
    let gameState = 'start'; // 'start', 'playing', 'crash', 'stageclear', 'gameover'
    let crashTimer = 0;
    let stageClearTimer = 0;

    const player = {
      lane: 0, t: 0, boosting: false,
      trans: null,       // {from, to, prog, side}
      zoneSide: -1, zoneChanges: 0,
      x: 0, y: 0, angle: 0
    };

    let enemies = [];

    function createEnemy(lane, t, speed) {
      return { lane, t, speed, trans: null, zoneSide: -1, x: 0, y: 0, angle: 0 };
    }

    function playerSlowSpeed() { return 1.7 + stage * 0.04; }
    function playerFastSpeed() { return playerSlowSpeed() * 1.75; }

    function resetPositions() {
      player.lane = 0;
      player.t = lanes[0].mids[0]; // bottom center
      player.trans = null;
      player.zoneSide = -1;
      player.zoneChanges = 0;
      player.boosting = false;
      enemies.forEach((e, i) => {
        e.lane = i % LANE_COUNT;
        e.t = lanes[e.lane].mids[2]; // top center
        e.trans = null;
        e.zoneSide = -1;
      });
    }

    function initStage() {
      const enemyCount = Math.min(stage, 3);
      enemies = [];
      for (let i = 0; i < enemyCount; i++) {
        enemies.push(createEnemy(0, 0, 1.5 + stage * 0.08 + i * 0.05));
      }
      resetPositions();
      initDots();
    }

    function resetGame() {
      score = 0;
      lives = 3;
      stage = 1;
      initStage();
    }

    // --- Input ---
    const keys = {};
    // Lever direction that means "inward" for each side (0=bottom,1=right,2=top,3=left)
    const INWARD_KEY = ['ArrowUp', 'ArrowLeft', 'ArrowDown', 'ArrowRight'];
    const OUTWARD_KEY = ['ArrowDown', 'ArrowRight', 'ArrowUp', 'ArrowLeft'];
    // Touch buttons set these flags directly
    let touchIn = false, touchOut = false;

    document.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
      if (e.key === ' ') {
        if (gameState === 'start') startGame();
        else if (gameState === 'gameover') startGame();
        else if (gameState === 'playing') player.boosting = true;
      }
    });
    document.addEventListener('keyup', (e) => {
      keys[e.key] = false;
      if (e.key === ' ') player.boosting = false;
    });

    function startGame() {
      ensureAudio();
      gameState = 'playing';
      resetGame();
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('gameover-screen').style.display = 'none';
    }

    function setupTouch() {
      const bind = (id, down, up) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); down(); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); up(); });
        el.addEventListener('touchcancel', (e) => { e.preventDefault(); up(); });
      };
      bind('in-btn', () => { touchIn = true; }, () => { touchIn = false; });
      bind('out-btn', () => { touchOut = true; }, () => { touchOut = false; });
      bind('speed-btn', () => { player.boosting = true; }, () => { player.boosting = false; });

      const tapStart = (e) => {
        if (gameState === 'start' || gameState === 'gameover') {
          if (e) e.preventDefault();
          startGame();
        }
      };
      document.getElementById('start-screen').addEventListener('touchstart', tapStart);
      document.getElementById('gameover-screen').addEventListener('touchstart', tapStart);
      document.getElementById('start-screen').addEventListener('click', () => tapStart());
      document.getElementById('gameover-screen').addEventListener('click', () => tapStart());
    }
    setupTouch();

    // --- Lane change logic ---
    const TRANS_SPEED = 0.13; // progress per frame

    function playerWantsChange(side) {
      // returns +1 (inward), -1 (outward), or 0
      if (keys[INWARD_KEY[side]] || touchIn) return 1;
      if (keys[OUTWARD_KEY[side]] || touchOut) return -1;
      return 0;
    }

    function updatePlayer() {
      const speed = player.boosting ? playerFastSpeed() : playerSlowSpeed();

      // advance along current (or from-) lane
      player.t = wrapT(player.trans ? player.trans.from : player.lane, player.t + speed);

      if (player.trans) {
        player.trans.prog += TRANS_SPEED;
        if (player.trans.prog >= 1) {
          const tr = player.trans;
          player.t = mapT(tr.from, tr.to, player.t, tr.side);
          player.lane = tr.to;
          player.trans = null;
        }
      }

      const curLane = player.trans ? player.trans.from : player.lane;
      const side = zoneAt(curLane, player.t);

      // track zone entry/exit
      if (side !== player.zoneSide) {
        player.zoneSide = side;
        player.zoneChanges = 0;
      }

      // start lane change if in zone, lever held, no active transition
      if (side >= 0 && !player.trans) {
        const maxChanges = player.boosting ? 1 : 2;
        const dir = playerWantsChange(side);
        if (dir !== 0 && player.zoneChanges < maxChanges) {
          const to = player.lane + dir;
          if (to >= 0 && to < LANE_COUNT) {
            player.trans = { from: player.lane, to, prog: 0, side };
            player.zoneChanges++;
          }
        }
      }

      // compute position
      if (player.trans) {
        const tr = player.trans;
        const a = getPos(tr.from, player.t);
        const b = getPos(tr.to, mapT(tr.from, tr.to, player.t, tr.side));
        player.x = a.x + (b.x - a.x) * tr.prog;
        player.y = a.y + (b.y - a.y) * tr.prog;
        player.angle = a.angle + (tr.to > tr.from ? -0.35 : 0.35);
      } else {
        const p = getPos(player.lane, player.t);
        player.x = p.x; player.y = p.y; player.angle = p.angle;
      }
    }

    function updateEnemy(e) {
      // enemy speeds up as dots get eaten
      const eaten = dots.filter(d => d.state === 2).length / Math.max(dots.length, 1);
      const spd = Math.min(e.speed * (1 + 0.4 * eaten), playerFastSpeed() * 0.95);

      // clockwise = t decreases
      e.t = wrapT(e.trans ? e.trans.from : e.lane, e.t - spd);

      if (e.trans) {
        e.trans.prog += TRANS_SPEED;
        if (e.trans.prog >= 1) {
          e.t = mapT(e.trans.from, e.trans.to, e.t, e.trans.side);
          e.lane = e.trans.to;
          e.trans = null;
        }
      }

      const curLane = e.trans ? e.trans.from : e.lane;
      const side = zoneAt(curLane, e.t);

      if (side !== e.zoneSide) {
        e.zoneSide = side;
        // decide once on zone entry: chase player's lane
        if (side >= 0 && !e.trans) {
          const targetLane = player.trans ? player.trans.to : player.lane;
          let dir = 0;
          if (targetLane > e.lane) dir = 1;
          else if (targetLane < e.lane) dir = -1;
          const chase = Math.random() < 0.8;
          if (dir !== 0 && chase) {
            e.trans = { from: e.lane, to: e.lane + dir, prog: 0, side };
          } else if (dir === 0 && Math.random() < 0.15) {
            const rd = Math.random() < 0.5 ? -1 : 1;
            const to = e.lane + rd;
            if (to >= 0 && to < LANE_COUNT) e.trans = { from: e.lane, to, prog: 0, side };
          }
        }
      }

      // position
      if (e.trans) {
        const tr = e.trans;
        const a = getPos(tr.from, e.t);
        const b = getPos(tr.to, mapT(tr.from, tr.to, e.t, tr.side));
        e.x = a.x + (b.x - a.x) * tr.prog;
        e.y = a.y + (b.y - a.y) * tr.prog;
        e.angle = a.angle + Math.PI + (tr.to > tr.from ? 0.35 : -0.35);
      } else {
        const p = getPos(e.lane, e.t);
        e.x = p.x; e.y = p.y; e.angle = p.angle + Math.PI;
      }

      // turn dots red as enemy passes over them
      const eLane = e.trans ? e.trans.from : e.lane;
      dots.forEach(d => {
        if (d.state !== 0) return;
        if (d.lane !== eLane) return;
        const dp = getPos(d.lane, d.t);
        if (Math.abs(e.x - dp.x) + Math.abs(e.y - dp.y) < 10) d.state = 1;
      });
    }

    // --- Update ---
    let engineTimer = 0;

    function update() {
      if (gameState === 'crash') {
        crashTimer--;
        if (crashTimer <= 0) {
          lives--;
          if (lives <= 0) {
            gameState = 'gameover';
            if (score > hiScore) {
              hiScore = score;
              localStorage.setItem('headon_hiscore', hiScore);
            }
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover-screen').style.display = 'flex';
          } else {
            resetPositions();
            gameState = 'playing';
          }
        }
        return;
      }

      if (gameState === 'stageclear') {
        stageClearTimer--;
        if (stageClearTimer <= 0) {
          stage++;
          initStage();
          gameState = 'playing';
        }
        return;
      }

      if (gameState !== 'playing') return;

      updatePlayer();
      enemies.forEach(updateEnemy);

      // collect dots (score in 5-point increments like original; red = double)
      const pLane = player.trans ? player.trans.from : player.lane;
      const pLane2 = player.trans ? player.trans.to : player.lane;
      dots.forEach(d => {
        if (d.state === 2) return;
        if (d.lane !== pLane && d.lane !== pLane2) return;
        const dp = getPos(d.lane, d.t);
        if (Math.abs(player.x - dp.x) + Math.abs(player.y - dp.y) < 10) {
          score += d.state === 1 ? 10 : 5;
          if (score >= 100000) score -= 100000; // original: score wraps at 100,000
          if (d.state === 1) playRedDotSound(); else playDotSound();
          d.state = 2;
        }
      });

      // stage clear
      if (dots.every(d => d.state === 2)) {
        gameState = 'stageclear';
        stageClearTimer = 100;
        playStageClearSound();
        return;
      }

      // collision
      for (const e of enemies) {
        const dx = player.x - e.x, dy = player.y - e.y;
        if (dx * dx + dy * dy < 13 * 13) {
          gameState = 'crash';
          crashTimer = 70;
          playCrashSound();
          return;
        }
      }

      // engine hum
      engineTimer++;
      if (engineTimer % 14 === 0) {
        playSound(70 + (player.boosting ? 50 : 20), 0.05, 'triangle', 0.03);
      }
    }

    // --- Drawing ---
    function drawTrack() {
      ctx.fillStyle = COLOR_BG;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = COLOR_LINE;
      ctx.lineWidth = 2;

      for (let k = 0; k <= LANE_COUNT; k++) {
        const o = MARGIN + LANE_W * k;
        const L = o, R = W - o, T = o, B = H - o;
        const cx = W / 2, cy = H / 2;

        if (k === 0 || k === LANE_COUNT) {
          // outer & inner boundary: continuous rectangle
          ctx.strokeRect(L, T, R - L, B - T);
        } else {
          // dividers with gaps at side midpoints
          ctx.beginPath();
          // top side
          ctx.moveTo(L, T); ctx.lineTo(cx - GAP_HALF, T);
          ctx.moveTo(cx + GAP_HALF, T); ctx.lineTo(R, T);
          // bottom side
          ctx.moveTo(L, B); ctx.lineTo(cx - GAP_HALF, B);
          ctx.moveTo(cx + GAP_HALF, B); ctx.lineTo(R, B);
          // left side
          ctx.moveTo(L, T); ctx.lineTo(L, cy - GAP_HALF);
          ctx.moveTo(L, cy + GAP_HALF); ctx.lineTo(L, B);
          // right side
          ctx.moveTo(R, T); ctx.lineTo(R, cy - GAP_HALF);
          ctx.moveTo(R, cy + GAP_HALF); ctx.lineTo(R, B);
          ctx.stroke();
        }
      }
    }

    function drawDots() {
      dots.forEach(d => {
        if (d.state === 2) return;
        const p = getPos(d.lane, d.t);
        if (d.state === 0) {
          ctx.fillStyle = COLOR_DOT;
          ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
        } else {
          // red diamond (double points)
          ctx.fillStyle = COLOR_RED_DOT;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(Math.PI / 4);
          ctx.fillRect(-3, -3, 6, 6);
          ctx.restore();
        }
      });
    }

    function drawCar(x, y, angle, color, crashed) {
      ctx.save();
      ctx.translate(x, y);
      if (crashed) {
        const t = crashTimer;
        ctx.fillStyle = t % 6 < 3 ? '#ff8800' : '#ffff00';
        for (let i = 0; i < 6; i++) {
          const a = (i / 6) * Math.PI * 2 + t * 0.1;
          const r = 6 + (70 - t) * 0.25;
          ctx.fillRect(Math.cos(a) * r - 3, Math.sin(a) * r - 3, 6, 6);
        }
        ctx.fillStyle = '#fff';
        ctx.fillRect(-4, -4, 8, 8);
      } else {
        ctx.rotate(angle);
        // body
        ctx.fillStyle = color;
        ctx.fillRect(-11, -6, 22, 12);
        // cockpit
        ctx.fillStyle = '#222';
        ctx.fillRect(1, -3, 6, 6);
        // wheels
        ctx.fillStyle = '#111';
        ctx.fillRect(-9, -8, 5, 2);
        ctx.fillRect(-9, 6, 5, 2);
        ctx.fillRect(4, -8, 5, 2);
        ctx.fillRect(4, 6, 5, 2);
      }
      ctx.restore();
    }

    function drawMiniCar(x, y) {
      ctx.fillStyle = COLOR_PLAYER;
      ctx.fillRect(x - 8, y - 4, 16, 8);
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 1, y - 2, 4, 4);
      ctx.fillStyle = '#111';
      ctx.fillRect(x - 6, y - 6, 4, 2);
      ctx.fillRect(x - 6, y + 4, 4, 2);
      ctx.fillRect(x + 3, y - 6, 4, 2);
      ctx.fillRect(x + 3, y + 4, 4, 2);
    }

    function drawCenter() {
      const cx = W / 2, cy = H / 2;
      // remaining cars (spares)
      const spares = Math.max(lives - 1, 0);
      for (let i = 0; i < spares; i++) {
        drawMiniCar(cx - (spares - 1) * 12 + i * 24, cy - 26);
      }
      // score (6 digits, like original)
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 26px "Courier New", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(score).padStart(6, '0'), cx, cy + 8);
      // hi-score (small)
      ctx.font = '12px "Courier New", monospace';
      ctx.fillStyle = '#ccddff';
      ctx.fillText('HI ' + String(hiScore).padStart(6, '0'), cx, cy + 34);

      if (gameState === 'stageclear') {
        ctx.fillStyle = '#ffd800';
        ctx.font = 'bold 16px "Courier New", monospace';
        ctx.fillText('STAGE ' + stage + ' CLEAR', cx, cy - 52);
      }
    }

    function draw() {
      drawTrack();
      drawDots();
      drawCenter();

      if (gameState === 'crash') {
        drawCar(player.x, player.y, player.angle, COLOR_PLAYER, true);
      } else if (gameState !== 'start') {
        drawCar(player.x, player.y, player.angle, COLOR_PLAYER, false);
      }
      if (gameState !== 'start') {
        enemies.forEach(e => drawCar(e.x, e.y, e.angle, COLOR_ENEMY, false));
      }
    }

    // --- Main Loop ---
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    // initialize a display state behind the start screen
    initStage();
    loop();
  </script>
</body>
</html>
