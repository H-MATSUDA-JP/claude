<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PopBee</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #223;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .hud {
      display: flex;
      justify-content: space-between;
      width: 420px;
      max-width: 100vw;
      font-size: 14px;
      padding: 4px 8px;
      color: #ffd;
    }
    .hud b { color: #ffdd44; }
    @media (max-width: 440px) {
      .hud { font-size: 11px; }
      .overlay h1 { font-size: 30px; }
      .overlay p { font-size: 12px; }
    }
    canvas {
      border: 2px solid #446;
      border-radius: 4px;
      max-width: 100vw;
      max-height: calc(100vh - 36px);
      touch-action: none;
    }
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(20,20,45,0.82);
      z-index: 10;
      text-align: center;
    }
    .overlay h1 {
      color: #ff9ec6;
      font-size: 42px;
      margin-bottom: 14px;
      text-shadow: 3px 3px 0 #7744aa, 0 0 24px rgba(255,158,198,0.5);
      letter-spacing: 3px;
    }
    .overlay p {
      color: #eef;
      font-size: 14px;
      margin: 3px 14px;
      line-height: 1.7;
    }
    .overlay .bells { font-size: 13px; color: #ccd; }
    .overlay .blink {
      animation: blink 1s step-start infinite;
      margin-top: 18px;
      color: #ffdd44;
      font-size: 16px;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="hud">
      <span>SCORE <b id="score">0</b></span>
      <span>HI <b id="hiscore">0</b></span>
      <span>LIVES <b id="lives">3</b></span>
    </div>
    <canvas id="canvas" width="420" height="560"></canvas>
  </div>

  <div class="overlay" id="startScreen">
    <h1>PopBee</h1>
    <p>ツインビー風ポップシューティング</p>
    <p id="controlHint">← ↑ ↓ → : 移動　　SPACE/Z : ショット（押しっぱなしOK）</p>
    <p class="bells">☁ 雲を撃つとベルが出るよ！ベルを撃つと色が変わる ☁</p>
    <p class="bells">
      🔔<span style="color:#ffdd44">黄=得点(連続で倍々)</span>
      🔔<span style="color:#fff">白=スピードUP</span>
      🔔<span style="color:#66aaff">青=ツインショット</span><br>
      🔔<span style="color:#66dd66">緑=3WAYショット</span>
      🔔<span style="color:#ff6666">赤=バリア</span>
    </p>
    <p class="blink" id="startHint">PRESS SPACE TO START</p>
  </div>

  <div class="overlay" id="gameOverScreen" style="display:none">
    <h1>GAME OVER</h1>
    <p style="font-size:18px">SCORE: <b id="finalScore" style="color:#ffdd44">0</b></p>
    <p class="blink" id="retryHint">PRESS SPACE TO RETRY</p>
  </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}
function beep(freq, dur, type = 'square', vol = 0.1, when = 0) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t);
  osc.stop(t + dur);
}
function playShoot() { beep(900, 0.06, 'square', 0.05); }
function playBellHit() { beep(1800, 0.07, 'triangle', 0.12); }
function playBellGet() { beep(1320, 0.08, 'triangle', 0.14); beep(1760, 0.1, 'triangle', 0.14, 0.08); }
function playPowerUp() { [660, 880, 1100, 1320].forEach((f, i) => beep(f, 0.1, 'square', 0.1, i * 0.07)); }
function playExplosion() {
  if (!audioCtx) return;
  const size = audioCtx.sampleRate * 0.18;
  const buf = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < size; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / size);
  const src = audioCtx.createBufferSource();
  const g = audioCtx.createGain();
  src.buffer = buf;
  src.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.16, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  src.start();
}
function playPlayerDeath() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(500, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.55);
  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.55);
  osc.start(); osc.stop(audioCtx.currentTime + 0.55);
}
function playExtend() { [523, 659, 784, 1047, 1319].forEach((f, i) => beep(f, 0.12, 'square', 0.12, i * 0.09)); }

// ── BGM: cheerful original loop ──
let bgmTimer = null;
let bgmStep = 0;
// 32 eighth-notes, C major bouncy tune (original composition)
const MELODY = [
  523, 659, 784, 659, 880, 784, 659, 523,
  587, 698, 880, 698, 784, 659, 587, 523,
  523, 659, 784, 880, 1047, 880, 784, 659,
  698, 880, 784, 659, 587, 659, 523, 0
];
const BASS = [
  262, 0, 196, 0, 220, 0, 196, 0,
  175, 0, 220, 0, 196, 0, 175, 0,
  262, 0, 196, 0, 175, 0, 196, 0,
  175, 0, 196, 0, 220, 0, 262, 0
];
function startBgm() {
  if (bgmTimer) return;
  bgmStep = 0;
  bgmTimer = setInterval(() => {
    if (!audioCtx || state !== 'playing') return;
    const m = MELODY[bgmStep % 32];
    const b = BASS[bgmStep % 32];
    if (m) beep(m, 0.12, 'square', 0.045);
    if (b) beep(b, 0.14, 'triangle', 0.055);
    bgmStep++;
  }, 140);
}
function stopBgm() {
  if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
}

// ── Game State ──
let state = 'start'; // start, playing, dying, gameover
let score = 0;
let hiScore = parseInt(localStorage.getItem('popbeeHiScore') || '0');
let lives = 3;
let frame = 0;
let deathTimer = 0;
let extendIndex = 0;
const EXTEND_SCORES = [10000, 50000, 100000];

const player = {
  x: W / 2, y: H - 70,
  speed: 3,
  shot: 1,       // 1=single, 2=twin, 3=3-way
  barrier: 0,    // hits the barrier can absorb
  inv: 0,
  fireCooldown: 0
};

let bullets = [];
let enemyBullets = [];
let enemies = [];
let clouds = [];
let bells = [];
let particles = [];
let popups = [];
let bgClouds = [];

// yellow bell chain
const YELLOW_VALUES = [500, 1000, 2500, 5000, 10000];
let yellowChain = 0;

// ── Input ──
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'Space' && (state === 'start' || state === 'gameover')) startGame();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isTouchDevice) {
  document.getElementById('controlHint').textContent = 'スライド : 移動　　触れている間オート連射';
  document.getElementById('startHint').textContent = 'TAP TO START';
  document.getElementById('retryHint').textContent = 'TAP TO RETRY';
}

let touchActive = false;
let touchLastX = null, touchLastY = null;
function getScale() {
  const r = canvas.getBoundingClientRect();
  return W / r.width;
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touchActive = true;
  touchLastX = t.clientX;
  touchLastY = t.clientY;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const s = getScale();
  player.x += (t.clientX - touchLastX) * s;
  player.y += (t.clientY - touchLastY) * s;
  touchLastX = t.clientX;
  touchLastY = t.clientY;
  clampPlayer();
}, { passive: false });
function touchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) { touchActive = false; touchLastX = null; touchLastY = null; }
}
canvas.addEventListener('touchend', touchEnd, { passive: false });
canvas.addEventListener('touchcancel', touchEnd, { passive: false });

document.getElementById('startScreen').addEventListener('touchend', e => {
  e.preventDefault();
  if (state === 'start') startGame();
});
document.getElementById('gameOverScreen').addEventListener('touchend', e => {
  e.preventDefault();
  if (state === 'gameover') startGame();
});

function clampPlayer() {
  player.x = Math.max(16, Math.min(W - 16, player.x));
  player.y = Math.max(40, Math.min(H - 24, player.y));
}

// ── Init ──
function initBgClouds() {
  bgClouds = [];
  for (let i = 0; i < 10; i++) {
    bgClouds.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 20 + Math.random() * 30,
      spd: 0.3 + Math.random() * 0.5,
      alpha: 0.25 + Math.random() * 0.3
    });
  }
}

function startGame() {
  ensureAudio();
  state = 'playing';
  score = 0;
  lives = 3;
  frame = 0;
  extendIndex = 0;
  yellowChain = 0;
  player.x = W / 2;
  player.y = H - 70;
  player.speed = 3;
  player.shot = 1;
  player.barrier = 0;
  player.inv = 0;
  bullets = []; enemyBullets = []; enemies = []; clouds = []; bells = [];
  particles = []; popups = [];
  keys['Space'] = false;
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  updateHUD();
  startBgm();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('hiscore').textContent = hiScore;
  document.getElementById('lives').textContent = lives;
}

function addScore(pts) {
  score += pts;
  if (extendIndex < EXTEND_SCORES.length && score >= EXTEND_SCORES[extendIndex]) {
    extendIndex++;
    lives++;
    playExtend();
    popups.push({ x: player.x, y: player.y - 24, text: '1UP!', timer: 60, color: '#ff9ec6' });
  }
  updateHUD();
}

// ── Spawning ──
function difficulty() { return 1 + Math.floor(frame / 1500) * 0.35; }

function spawnWave() {
  // every ~110 frames pick a formation, faster over time
  const interval = Math.max(55, 110 - Math.floor(frame / 900) * 8);
  if (frame % interval !== 0) return;
  const kind = Math.random();
  const d = difficulty();
  if (kind < 0.45) {
    // sine-wave line of cherries from top
    const n = 4 + Math.floor(Math.random() * 3);
    const baseX = 40 + Math.random() * (W - 80);
    for (let i = 0; i < n; i++) {
      enemies.push({
        type: 'cherry', x: baseX, y: -20 - i * 34,
        vy: 1.6 * d, phase: Math.random() * 6.28, amp: 50 + Math.random() * 40,
        baseX: baseX, r: 11, hp: 1, pts: 100, t: 0
      });
    }
  } else if (kind < 0.75) {
    // oranges swooping in from the sides
    const fromLeft = Math.random() < 0.5;
    const n = 3;
    for (let i = 0; i < n; i++) {
      enemies.push({
        type: 'orange', x: fromLeft ? -20 - i * 30 : W + 20 + i * 30,
        y: 60 + Math.random() * 120,
        vx: (fromLeft ? 1 : -1) * (2 + d * 0.5), vy: 0.4,
        curve: 0.03 + Math.random() * 0.02,
        r: 12, hp: 1, pts: 150, t: 0
      });
    }
  } else {
    // walnut: tougher, descends then shoots at the player
    enemies.push({
      type: 'walnut', x: 40 + Math.random() * (W - 80), y: -24,
      vy: 1.2 * d, stopY: 90 + Math.random() * 130,
      shootTimer: 0, r: 14, hp: 3, pts: 300, t: 0
    });
  }
}

function spawnCloud() {
  const interval = 240;
  if (frame % interval !== 0) return;
  clouds.push({
    x: 40 + Math.random() * (W - 80),
    y: -24,
    vy: 0.9,
    r: 22,
    hasBell: Math.random() < 0.85,
    hp: 1
  });
}

// ── Bells ──
const BELL_COLORS = ['yellow', 'white', 'blue', 'green', 'red'];
const BELL_DRAW = {
  yellow: '#ffdd44', white: '#ffffff', blue: '#66aaff', green: '#66dd66', red: '#ff6666'
};

function applyBell(bell) {
  playBellGet();
  if (bell.color === 'yellow') {
    const v = YELLOW_VALUES[Math.min(yellowChain, YELLOW_VALUES.length - 1)];
    yellowChain++;
    addScore(v);
    popups.push({ x: bell.x, y: bell.y, text: String(v), timer: 50, color: '#ffdd44' });
  } else {
    playPowerUp();
    if (bell.color === 'white') {
      player.speed = Math.min(player.speed + 0.6, 6);
      popups.push({ x: bell.x, y: bell.y, text: 'SPEED UP!', timer: 55, color: '#fff' });
    } else if (bell.color === 'blue') {
      player.shot = Math.max(player.shot, 2);
      popups.push({ x: bell.x, y: bell.y, text: 'TWIN SHOT!', timer: 55, color: '#66aaff' });
    } else if (bell.color === 'green') {
      player.shot = 3;
      popups.push({ x: bell.x, y: bell.y, text: '3WAY!', timer: 55, color: '#66dd66' });
    } else if (bell.color === 'red') {
      player.barrier = 3;
      popups.push({ x: bell.x, y: bell.y, text: 'BARRIER!', timer: 55, color: '#ff6666' });
    }
    addScore(100);
  }
}

// ── Player ──
function fire() {
  if (player.fireCooldown > 0) return;
  player.fireCooldown = 9;
  playShoot();
  if (player.shot === 1) {
    bullets.push({ x: player.x, y: player.y - 14, vx: 0, vy: -8 });
  } else if (player.shot === 2) {
    bullets.push({ x: player.x - 7, y: player.y - 12, vx: 0, vy: -8 });
    bullets.push({ x: player.x + 7, y: player.y - 12, vx: 0, vy: -8 });
  } else {
    bullets.push({ x: player.x, y: player.y - 14, vx: 0, vy: -8 });
    bullets.push({ x: player.x - 8, y: player.y - 10, vx: -1.8, vy: -7.5 });
    bullets.push({ x: player.x + 8, y: player.y - 10, vx: 1.8, vy: -7.5 });
  }
}

function startPlayerDeath() {
  state = 'dying';
  deathTimer = 80;
  playPlayerDeath();
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * 6.28;
    const s = 1 + Math.random() * 3;
    particles.push({
      x: player.x, y: player.y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      timer: 30 + Math.random() * 25,
      color: ['#ff9ec6', '#ffdd44', '#66aaff', '#fff'][Math.floor(Math.random() * 4)]
    });
  }
}

function hitPlayer() {
  if (player.inv > 0) return;
  if (player.barrier > 0) {
    player.barrier--;
    player.inv = 30;
    beep(300, 0.15, 'sawtooth', 0.12);
    return;
  }
  startPlayerDeath();
}

// ── Update ──
function update() {
  if (state === 'dying') {
    deathTimer--;
    updateParticles();
    if (deathTimer <= 0) {
      lives--;
      updateHUD();
      if (lives <= 0) {
        gameOver();
      } else {
        // lose powerups like the original
        player.x = W / 2; player.y = H - 70;
        player.shot = 1; player.barrier = 0; player.speed = 3;
        player.inv = 120;
        enemyBullets = [];
        state = 'playing';
      }
    }
    return;
  }
  if (state !== 'playing') return;
  frame++;

  // player move
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;
  clampPlayer();

  if (player.fireCooldown > 0) player.fireCooldown--;
  if (keys['Space'] || keys['KeyZ'] || touchActive) fire();
  if (player.inv > 0) player.inv--;

  spawnWave();
  spawnCloud();

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.y < -12 || b.x < -12 || b.x > W + 12) { bullets.splice(i, 1); continue; }

    // vs clouds
    let hit = false;
    for (let j = clouds.length - 1; j >= 0; j--) {
      const c = clouds[j];
      if (Math.abs(b.x - c.x) < c.r && Math.abs(b.y - c.y) < c.r * 0.7) {
        if (c.hasBell) {
          bells.push({ x: c.x, y: c.y, vy: -2.5, color: 'yellow', hits: 0 });
        }
        puff(c.x, c.y, '#fff');
        clouds.splice(j, 1);
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;

    // vs bells (juggle: bounce up, cycle color)
    for (const bell of bells) {
      if (Math.abs(b.x - bell.x) < 12 && Math.abs(b.y - bell.y) < 12) {
        bell.vy = -3.4;
        bell.hits++;
        if (bell.hits % 3 === 0) {
          const idx = (BELL_COLORS.indexOf(bell.color) + 1) % BELL_COLORS.length;
          bell.color = BELL_COLORS[idx];
        }
        playBellHit();
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) continue;

    // vs enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx * dx + dy * dy < (e.r + 3) * (e.r + 3)) {
        e.hp--;
        bullets.splice(i, 1);
        if (e.hp <= 0) {
          explode(e.x, e.y, e.type === 'cherry' ? '#ff6688' : e.type === 'orange' ? '#ffaa33' : '#bb8855');
          addScore(e.pts);
          popups.push({ x: e.x, y: e.y, text: String(e.pts), timer: 35, color: '#fff' });
          playExplosion();
          enemies.splice(j, 1);
        } else {
          beep(200, 0.05, 'square', 0.06);
        }
        break;
      }
    }
  }

  // bells fall & collect
  for (let i = bells.length - 1; i >= 0; i--) {
    const bell = bells[i];
    bell.vy += 0.06;
    bell.y += bell.vy;
    const dx = bell.x - player.x, dy = bell.y - player.y;
    if (dx * dx + dy * dy < 20 * 20) {
      applyBell(bell);
      bells.splice(i, 1);
      continue;
    }
    if (bell.y > H + 16) {
      if (bell.color === 'yellow') yellowChain = 0; // missed: chain resets
      bells.splice(i, 1);
    }
  }

  // clouds drift
  for (let i = clouds.length - 1; i >= 0; i--) {
    clouds[i].y += clouds[i].vy;
    if (clouds[i].y > H + 30) clouds.splice(i, 1);
  }

  // enemies
  const d = difficulty();
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.t++;
    if (e.type === 'cherry') {
      e.y += e.vy;
      e.x = e.baseX + Math.sin(e.phase + e.t * 0.05) * e.amp;
    } else if (e.type === 'orange') {
      // curve toward the player's side of the screen
      e.vy += e.curve;
      e.x += e.vx; e.y += e.vy;
    } else if (e.type === 'walnut') {
      if (e.y < e.stopY) e.y += e.vy;
      else {
        e.shootTimer++;
        if (e.shootTimer > Math.max(50, 90 - frame / 100)) {
          e.shootTimer = 0;
          const a = Math.atan2(player.y - e.y, player.x - e.x);
          const spd = 2.4 + d * 0.4;
          enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd });
          beep(500, 0.06, 'square', 0.05);
        }
      }
    }
    // collision with player
    const dx = e.x - player.x, dy = e.y - player.y;
    if (dx * dx + dy * dy < (e.r + 9) * (e.r + 9)) {
      hitPlayer();
      if (state !== 'playing') return;
    }
    if (e.y > H + 30 || e.x < -50 || e.x > W + 50) enemies.splice(i, 1);
  }

  // enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    const dx = b.x - player.x, dy = b.y - player.y;
    if (dx * dx + dy * dy < 11 * 11) {
      enemyBullets.splice(i, 1);
      hitPlayer();
      if (state !== 'playing') return;
      continue;
    }
    if (b.y > H + 10 || b.y < -10 || b.x < -10 || b.x > W + 10) enemyBullets.splice(i, 1);
  }

  updateParticles();

  // popups
  for (let i = popups.length - 1; i >= 0; i--) {
    popups[i].timer--;
    popups[i].y -= 0.5;
    if (popups[i].timer <= 0) popups.splice(i, 1);
  }

  // bg clouds
  for (const c of bgClouds) {
    c.y += c.spd;
    if (c.y - c.r > H) { c.y = -c.r; c.x = Math.random() * W; }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.timer--;
    if (p.timer <= 0) particles.splice(i, 1);
  }
}

function explode(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * 6.28;
    const s = 0.5 + Math.random() * 2.5;
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      timer: 20 + Math.random() * 15, color
    });
  }
}

function puff(x, y, color) {
  for (let i = 0; i < 6; i++) {
    const a = Math.random() * 6.28;
    particles.push({
      x, y, vx: Math.cos(a) * 1.2, vy: Math.sin(a) * 1.2 - 0.5,
      timer: 15 + Math.random() * 10, color
    });
  }
}

function gameOver() {
  state = 'gameover';
  stopBgm();
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('popbeeHiScore', String(hiScore));
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOverScreen').style.display = 'flex';
  updateHUD();
}

// ── Drawing ──
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#7ec8f0');
  grad.addColorStop(0.6, '#a8dcf8');
  grad.addColorStop(1, '#cceeff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  for (const c of bgClouds) {
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, 6.28);
    ctx.arc(c.x + c.r * 0.7, c.y + c.r * 0.2, c.r * 0.7, 0, 6.28);
    ctx.arc(c.x - c.r * 0.7, c.y + c.r * 0.25, c.r * 0.6, 0, 6.28);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPlayer() {
  if (state === 'dying') return;
  if (player.inv > 0 && Math.floor(player.inv / 4) % 2) return;
  const x = player.x, y = player.y;
  ctx.save();
  // barrier
  if (player.barrier > 0) {
    ctx.strokeStyle = 'rgba(255,102,102,0.7)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(x, y, 20 + Math.sin(frame * 0.2) * 2, 0, 6.28);
    ctx.stroke();
  }
  // propeller
  ctx.strokeStyle = '#88ccee';
  ctx.lineWidth = 2;
  const pw = 12 * Math.abs(Math.sin(frame * 0.6));
  ctx.beginPath();
  ctx.moveTo(x - pw, y - 16);
  ctx.lineTo(x + pw, y - 16);
  ctx.stroke();
  ctx.fillStyle = '#666';
  ctx.fillRect(x - 1, y - 16, 2, 4);
  // body (round, cute)
  ctx.fillStyle = '#ff9ec6';
  ctx.beginPath();
  ctx.arc(x, y, 12, 0, 6.28);
  ctx.fill();
  // belly
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y + 3, 8, 0, 6.28);
  ctx.fill();
  // cockpit dome
  ctx.fillStyle = '#aaddff';
  ctx.beginPath();
  ctx.arc(x, y - 4, 6, 3.14, 6.28);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(x - 2, y - 5, 2, 0, 6.28);
  ctx.fill();
  // little arms
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(x - 16, y - 2, 5, 7);
  ctx.fillRect(x + 11, y - 2, 5, 7);
  // feet
  ctx.fillStyle = '#dd7799';
  ctx.fillRect(x - 8, y + 10, 6, 4);
  ctx.fillRect(x + 2, y + 10, 6, 4);
  ctx.restore();
}

function drawEnemies() {
  for (const e of enemies) {
    ctx.save();
    if (e.type === 'cherry') {
      ctx.fillStyle = '#ff5577';
      ctx.beginPath(); ctx.arc(e.x - 4, e.y + 2, 8, 0, 6.28); ctx.fill();
      ctx.beginPath(); ctx.arc(e.x + 5, e.y + 3, 7, 0, 6.28); ctx.fill();
      ctx.strokeStyle = '#66aa44';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(e.x - 4, e.y - 4); ctx.quadraticCurveTo(e.x, e.y - 14, e.x + 5, e.y - 4);
      ctx.stroke();
      // eyes
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x - 7, e.y, 3, 4); ctx.fillRect(e.x - 1, e.y, 3, 4);
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x - 6, e.y + 1, 2, 2); ctx.fillRect(e.x, e.y + 1, 2, 2);
    } else if (e.type === 'orange') {
      ctx.fillStyle = '#ffaa33';
      ctx.beginPath(); ctx.arc(e.x, e.y, 11, 0, 6.28); ctx.fill();
      ctx.fillStyle = '#88cc55';
      ctx.fillRect(e.x - 2, e.y - 14, 4, 5);
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x - 6, e.y - 3, 4, 5); ctx.fillRect(e.x + 2, e.y - 3, 4, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x - 5, e.y - 1, 2, 2); ctx.fillRect(e.x + 3, e.y - 1, 2, 2);
    } else if (e.type === 'walnut') {
      ctx.fillStyle = '#bb8855';
      ctx.beginPath(); ctx.arc(e.x, e.y, 13, 0, 6.28); ctx.fill();
      ctx.strokeStyle = '#996633';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(e.x, e.y, 9, 0.5, 2.6);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(e.x, e.y, 5, 3.6, 5.8);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.fillRect(e.x - 6, e.y - 2, 4, 5); ctx.fillRect(e.x + 2, e.y - 2, 4, 5);
      ctx.fillStyle = '#000';
      ctx.fillRect(e.x - 5, e.y, 2, 2); ctx.fillRect(e.x + 3, e.y, 2, 2);
      // hp cracks
      if (e.hp <= 2) { ctx.strokeStyle = '#553311'; ctx.beginPath(); ctx.moveTo(e.x - 8, e.y - 8); ctx.lineTo(e.x - 2, e.y - 2); ctx.stroke(); }
      if (e.hp <= 1) { ctx.strokeStyle = '#553311'; ctx.beginPath(); ctx.moveTo(e.x + 8, e.y - 6); ctx.lineTo(e.x + 2, e.y); ctx.stroke(); }
    }
    ctx.restore();
  }
}

function drawClouds() {
  for (const c of clouds) {
    ctx.fillStyle = '#ffffff';
    ctx.strokeStyle = '#ddeeff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r * 0.75, 0, 6.28);
    ctx.arc(c.x - c.r * 0.6, c.y + 4, c.r * 0.5, 0, 6.28);
    ctx.arc(c.x + c.r * 0.6, c.y + 4, c.r * 0.5, 0, 6.28);
    ctx.fill();
    ctx.stroke();
  }
}

function drawBells() {
  for (const bell of bells) {
    const color = BELL_DRAW[bell.color];
    ctx.save();
    ctx.translate(bell.x, bell.y);
    // glow for non-yellow
    if (bell.color !== 'yellow') {
      ctx.globalAlpha = 0.35 + Math.sin(frame * 0.3) * 0.15;
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(0, 0, 14, 0, 6.28); ctx.fill();
      ctx.globalAlpha = 1;
    }
    // bell shape
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -2, 8, 3.14, 6.28);
    ctx.fill();
    ctx.fillRect(-8, -2, 16, 6);
    ctx.fillRect(-10, 4, 20, 3);
    // clapper
    ctx.fillStyle = bell.color === 'white' ? '#ccc' : '#fff';
    ctx.fillRect(-2, 7, 4, 3);
    // outline
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.lineWidth = 1;
    ctx.strokeRect(-10, 4, 20, 3);
    ctx.restore();
  }
}

function drawBullets() {
  ctx.fillStyle = '#fff';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 3, 0, 6.28);
    ctx.fill();
    ctx.fillStyle = '#ffdd88';
    ctx.fillRect(b.x - 1, b.y + 3, 2, 5);
    ctx.fillStyle = '#fff';
  }
  ctx.fillStyle = '#ff4466';
  for (const b of enemyBullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, 6.28);
    ctx.fill();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.min(1, p.timer / 20);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
}

function drawPopups() {
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px Courier New';
  for (const p of popups) {
    ctx.globalAlpha = Math.min(1, p.timer / 25);
    ctx.fillStyle = p.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 3;
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// ── Loop ──
function gameLoop() {
  drawBackground();
  if (state === 'playing' || state === 'dying') {
    update();
    drawClouds();
    drawEnemies();
    drawBells();
    drawBullets();
    drawPlayer();
    drawParticles();
    drawPopups();
  }
  requestAnimationFrame(gameLoop);
}

initBgClouds();
updateHUD();
gameLoop();
</script>
