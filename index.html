<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゲーム一覧</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f6f6f6;
      color: #333;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      color: #e37711;
      font-size: 28px;
      border-bottom: 3px solid #e37711;
      padding-bottom: 12px;
      margin-bottom: 32px;
    }
    .game-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }
    .game-card {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      border-color: #e37711;
    }
    .game-card .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .game-card h2 {
      font-size: 18px;
      color: #e37711;
      margin-bottom: 8px;
    }
    .game-card p {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Game Collection</h1>
    <div class="game-list">
      <a href="tetris/" class="game-card">
        <div class="icon">🧱</div>
        <h2>Tetris</h2>
        <p>ロシア民謡BGM付きテトリス。ホールド機能、ゴースト表示、サウンドエフェクト搭載。</p>
      </a>
      <a href="mc/" class="game-card">
        <div class="icon">🚀</div>
        <h2>Missile Command</h2>
        <p>迫り来るミサイルから都市を守れ！クリックで迎撃ミサイルを発射。ウェーブ制。</p>
      </a>
      <a href="invader/" class="game-card">
        <div class="icon">👾</div>
        <h2>Space Invaders</h2>
        <p>エイリアンの侵略を阻止せよ！移動・射撃サウンド、UFO登場サウンド付き。</p>
      </a>
    </div>
  </div>
</body>
</html>
